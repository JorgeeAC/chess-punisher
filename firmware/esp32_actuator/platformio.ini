[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.4
build_flags =
  -D WIFI_SSID=\"YOUR_WIFI_SSID\"
  -D WIFI_PASS=\"YOUR_WIFI_PASSWORD\"
  -D MQTT_HOST=\"192.168.1.100\"
  -D MQTT_PORT=1883
  -D DEVICE_ID=\"esp32-1\"
